# yonxao-mindmap Release Workflow
#
# 触发方式：推送符合 *.*.* 语义化版本格式的 tag 时自动触发。
#
# 流程说明：
# 1. 检出代码。
# 2. 安装 Node.js（从 package.json engines 读取）。
# 3. 安装依赖。
# 4. 执行构建与发布准备（clean → build → 复制 manifest.json）。
# 5. 从 CHANGELOG.md 生成 dist/release-body.md。
# 6. 从 manifest.json 读取版本号。
# 7. 将 dist/ 目录（main.js, styles.css, manifest.json）打包为 Obsidian 插件压缩包。
# 8. 创建 GitHub Release，上传压缩包与三件套。

name: Release

on:
  push:
    tags:
      - '*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Build and Create Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and prepare release artifacts
        run: npm run release:prepare

      - name: Read version from manifest.json
        id: version
        run: echo "version=$(node -p "require('./manifest.json').version")" >> "$GITHUB_OUTPUT"

      - name: Package release artifacts
        run: |
          cd dist
          zip -r ../yonxao-mindmap-${{ steps.version.outputs.version }}.zip \
            main.js styles.css manifest.json
          cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.version.outputs.version }}
          tag_name: ${{ steps.version.outputs.version }}
          body_path: dist/release-body.md
          fail_on_unmatched_files: true
          files: |
            yonxao-mindmap-${{ steps.version.outputs.version }}.zip
            dist/main.js
            dist/styles.css
            dist/manifest.json
